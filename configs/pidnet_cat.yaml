seed: 1337
raw_root: CAT
processed_root: data_processed_blue_green
reports_dir: reports
configs_dir: configs
outputs_dir: outputs
dataset_name: mixed
experiment_name: mixed_binary_traversability_pidnet_hardware

preprocessing:
  val_fraction: 0.2
  traversable_palette_names: [blue, green]
  mapping_filename: discovered_mapping_blue_green.yaml

training:
  model_name: pidnet-s
  input_size: [640, 384]
  batch_size: 4
  epochs: 15
  learning_rate: 0.00025
  min_learning_rate: 0.00001
  weight_decay: 0.0001
  mixed_precision: bf16
  num_workers: 4
  augment: true
  untraversable_weight_bias: 2.5
  traversable_weight_bias: 0.75

postprocessing:
  traversable_threshold: 0.5
