  - 640
  - 384
  batch_size: 4
  gradient_accumulation_steps: 1
  val_batch_size: 2
  epochs: 15
  learning_rate: 0.00025
  min_learning_rate: 1.0e-05
  weight_decay: 0.0001
  mixed_precision: bf16
  num_workers: 0
  augment: true
  untraversable_weight_bias: 2.5
  traversable_weight_bias: 0.75
postprocessing:
  traversable_threshold: 0.5
