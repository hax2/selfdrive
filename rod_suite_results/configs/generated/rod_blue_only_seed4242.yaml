seed: 4242
raw_root: CAT
processed_root: data_processed_blue
reports_dir: reports
configs_dir: configs
outputs_dir: outputs
dataset_name: mixed
experiment_name: mixed_binary_traversability_rod_vits_blue_seed4242
preprocessing:
  val_fraction: 0.2
  traversable_palette_names:
  - blue
  mapping_filename: discovered_mapping_blue.yaml
training:
